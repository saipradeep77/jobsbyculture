    <style>
        :root {
            --bg: #fafaf8;
            --bg-raised: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f4f3ef;
            --text: #1a1a1f;
            --text-2: #52525b;
            --text-3: #9ca3af;
            --accent: #e8590c;
            --accent-hover: #c2410c;
            --accent-bg: rgba(232,89,12,0.06);
            --accent-border: rgba(232,89,12,0.2);
            --teal: #0d9488;
            --teal-bg: rgba(13,148,136,0.06);
            --teal-border: rgba(13,148,136,0.2);
            --violet: #7c3aed;
            --violet-bg: rgba(124,58,237,0.06);
            --violet-border: rgba(124,58,237,0.2);
            --rose: #e11d48;
            --rose-bg: rgba(225,29,72,0.06);
            --rose-border: rgba(225,29,72,0.2);
            --sky: #0284c7;
            --sky-bg: rgba(2,132,199,0.06);
            --sky-border: rgba(2,132,199,0.2);
            --orange: #e8590c;
            --orange-bg: rgba(232,89,12,0.06);
            --orange-border: rgba(232,89,12,0.2);
            --border: rgba(0,0,0,0.07);
            --border-2: rgba(0,0,0,0.12);
            --border-3: rgba(0,0,0,0.18);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --radius-full: 100px;
            --font-display: 'Instrument Serif', Georgia, serif;
            --font-body: 'Satoshi', -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --shadow: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.07);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        /* NAV */
        nav { position: sticky; top: 0; z-index: 100; background: rgba(250,250,248,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .nav-mark { width: 28px; height: 28px; position: relative; display: flex; align-items: center; justify-content: center; }
        .nav-mark .ring { position: absolute; border: 1.5px solid var(--accent); border-radius: 50%; animation: logoPing 2.5s ease-out infinite; }
        .nav-mark .ring-1 { width: 100%; height: 100%; opacity: 0.2; }
        .nav-mark .ring-2 { width: 65%; height: 65%; opacity: 0.4; animation-delay: 0.3s; }
        .nav-mark .nav-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: relative; z-index: 1; }
        @keyframes logoPing { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.5); opacity: 0; } }
        .nav-wordmark { font-weight: 700; font-size: 15px; letter-spacing: -0.03em; }
        .nav-wordmark span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 24px; }
        .nav-links a { color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 500; }
        .nav-links a:hover { color: var(--text); }
        .nav-links .nav-cta {
            background: var(--accent); color: #fff !important; padding: 7px 16px;
            border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
            transition: all 0.2s;
        }
        .nav-links .nav-cta:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .nav-links a.active { color: var(--accent); font-weight: 600; }
        .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; flex-direction: column; gap: 5px; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 1px; transition: all 0.3s; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* LAYOUT */
        .page { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .page-head { padding: 40px 0 28px; }
        .page-head h1 { font-family: var(--font-display); font-size: 36px; font-weight: 400; margin-bottom: 6px; }
        .page-head h1 em { font-style: italic; color: var(--accent); }
        .page-head p { color: var(--text-2); font-size: 15px; }
        .main-grid { display: grid; grid-template-columns: 260px 1fr; gap: 28px; padding-bottom: 80px; }

        /* SIDEBAR */
        .sidebar { position: sticky; top: 72px; align-self: start; max-height: calc(100vh - 90px); overflow-y: auto; padding-right: 8px; }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
        .sb-section { margin-bottom: 24px; }
        .sb-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 10px; }
        .search-wrap { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 10px 12px 10px 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-raised); font-size: 14px; font-family: var(--font-body); color: var(--text); outline: none; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
        .search-input::placeholder { color: var(--text-3); }
        .search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-3); pointer-events: none; }

        .value-filters { display: flex; flex-direction: column; gap: 4px; }
        .vf {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 10px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 13px; color: var(--text-2);
            transition: all 0.15s; user-select: none; border: 1px solid transparent;
        }
        .vf:hover { background: var(--bg-hover); }
        .vf .ico { font-size: 14px; flex-shrink: 0; }
        .vf .cnt { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); min-width: 20px; text-align: right; }
        .vf.on { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); font-weight: 600; }
        .vf.on .cnt { color: var(--accent); }

        .sb-clear { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 600; display: none; margin-top: 8px; }
        .sb-clear:hover { text-decoration: underline; }
        .sb-clear.show { display: block; }

        /* MOBILE FILTER COLLAPSE */
        .mobile-filter-bar { display: none; }
        .desktop-only { display: block; }
        .filter-sections { display: block; }
        .filter-toggle-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 14px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--bg-raised);
            font-size: 13px; font-weight: 600; color: var(--text-2);
            white-space: nowrap; flex-shrink: 0; cursor: pointer;
        }
        .filter-toggle-btn.active { border-color: var(--accent); color: var(--accent); }
        .filter-count {
            display: none; min-width: 18px; height: 18px; padding: 0 5px;
            border-radius: 9px; background: var(--accent); color: #fff;
            font-size: 11px; font-weight: 700; line-height: 18px; text-align: center;
        }
        .filter-count.show { display: inline-block; }

        .loc-filters { display: flex; flex-direction: column; gap: 3px; }
        .lf { padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text-2); transition: all 0.15s; }
        .lf:hover { background: var(--bg-hover); }
        .lf.on { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
        .lf .cnt { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-left: 4px; }

        /* RESULTS */
        .results-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .results-count { font-size: 14px; color: var(--text-2); }
        .results-count b { color: var(--text); }
        .sort-select { padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-raised); font-size: 13px; font-family: var(--font-body); color: var(--text-2); cursor: pointer; }
        .results-list { display: flex; flex-direction: column; gap: 8px; }

        /* COMPANY CULTURE CARD */
        .company-culture-card {
            background: var(--bg-raised); border: 1px solid var(--accent-border);
            border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 16px;
        }
        .ccc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .ccc-logo { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 5px; object-fit: contain; }
        .ccc-name { font-size: 16px; font-weight: 700; }
        .ccc-meta { font-size: 12px; color: var(--text-2); }
        .ccc-values { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
        .ccc-link { display: inline-block; font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
        .ccc-link:hover { text-decoration: underline; }

        /* JOB CARD */
        .job {
            background: var(--bg-raised); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 20px 22px;
            transition: all 0.2s; position: relative;
        }
        .job:hover { border-color: var(--border-2); box-shadow: var(--shadow); transform: translateY(-1px); cursor: pointer; }
        a.job { text-decoration: none; color: inherit; display: block; }
        .job-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
        .job-avatar {
            width: 42px; height: 42px; border-radius: var(--radius-sm);
            background: var(--bg); border: 1px solid var(--border);
            display: grid; place-items: center;
            font-size: 15px; font-weight: 800; flex-shrink: 0;
            overflow: hidden;
        }
        .job-avatar img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
        .job-info { flex: 1; min-width: 0; }
        .job-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
        .job-company { font-size: 13px; color: var(--text-2); }
        .job-company b { color: var(--text); font-weight: 600; }
        .job-company-link { cursor: pointer; text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.15s; }
        .job-company-link:hover { text-decoration-color: var(--accent); color: var(--accent); }
        .job-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; font-size: 12.5px; color: var(--text-3); margin-bottom: 12px; }
        .job-meta span { display: flex; align-items: center; gap: 4px; }
        .job-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
        .jt {
            padding: 4px 10px; border-radius: var(--radius-full);
            font-size: 11.5px; font-weight: 500;
            transition: all 0.15s;
        }
        .jt-teal { background: var(--teal-bg); border: 1px solid var(--teal-border); color: var(--teal); }
        .jt-violet { background: var(--violet-bg); border: 1px solid var(--violet-border); color: var(--violet); }
        .jt-sky { background: var(--sky-bg); border: 1px solid var(--sky-border); color: var(--sky); }
        .jt-orange { background: var(--orange-bg); border: 1px solid var(--orange-border); color: var(--orange); }
        .jt-rose { background: var(--rose-bg); border: 1px solid var(--rose-border); color: var(--rose); }
        .jt.match { font-weight: 700; }
        .jt.match-teal { background: var(--teal); border-color: var(--teal); color: #fff; }
        .jt.match-violet { background: var(--violet); border-color: var(--violet); color: #fff; }
        .jt.match-sky { background: var(--sky); border-color: var(--sky); color: #fff; }
        .jt.match-orange { background: var(--accent); border-color: var(--accent); color: #fff; }
        .jt.match-rose { background: var(--rose); border-color: var(--rose); color: #fff; }

        .job-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
        .job-bottom-left { display: flex; align-items: center; gap: 12px; }
        .job-salary { font-family: var(--font-mono); font-size: 13px; color: var(--teal); font-weight: 500; }
        .job-posted { font-size: 12px; color: var(--text-3); }
        .culture-peek-btn {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer;
            padding: 4px 10px; border-radius: var(--radius-full);
            border: 1px solid var(--accent-border); background: var(--accent-bg);
            transition: all 0.15s;
        }
        .culture-peek-btn:hover { background: rgba(232,89,12,0.12); border-color: var(--accent); }
        .culture-peek-btn.open { background: var(--accent); color: #fff; border-color: var(--accent); }
        .culture-peek {
            display: none; margin-top: 14px; padding: 18px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .culture-peek.open { display: block; }
        /* Overall score badge */
        .cp-overall {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
        }
        .cp-overall-num {
            width: 48px; height: 48px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-mono); font-size: 20px; font-weight: 600;
            flex-shrink: 0;
        }
        .cp-overall-num.high { background: var(--teal-bg); color: var(--teal); border: 1px solid var(--teal-border); }
        .cp-overall-num.mid { background: rgba(217,119,6,0.06); color: #d97706; border: 1px solid rgba(217,119,6,0.2); }
        .cp-overall-num.low { background: var(--rose-bg); color: var(--rose); border: 1px solid var(--rose-border); }
        .cp-overall-info { flex: 1; }
        .cp-overall-title { font-size: 14px; font-weight: 600; color: var(--text); }
        .cp-overall-sub { font-size: 12px; color: var(--text-3); }
        /* Rating items grid (mirroring company pages) */
        .cp-ratings {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 16px;
        }
        .cp-rating-item {
            background: var(--bg-raised); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 14px;
        }
        .cp-rating-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .cp-rating-label { font-size: 12px; font-weight: 500; color: var(--text-2); }
        .cp-rating-val { font-family: var(--font-mono); font-size: 14px; font-weight: 600; }
        .cp-rating-val.high { color: var(--teal); }
        .cp-rating-val.mid { color: #d97706; }
        .cp-rating-val.low { color: var(--rose); }
        .cp-rating-bar { height: 5px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; }
        .cp-rating-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .cp-rating-fill.high { background: var(--teal); }
        .cp-rating-fill.mid { background: #d97706; }
        .cp-rating-fill.low { background: var(--rose); }
        /* Pros & Cons */
        .cp-reviews { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .cp-review-col h4 {
            font-size: 12px; font-weight: 600; margin-bottom: 8px;
            display: flex; align-items: center; gap: 5px;
        }
        .cp-review-col h4 .cp-ico-pro { color: var(--teal); font-size: 13px; }
        .cp-review-col h4 .cp-ico-con { color: var(--rose); font-size: 13px; }
        .cp-review-list {
            list-style: none; display: flex; flex-direction: column; gap: 8px;
        }
        .cp-review-list li {
            display: flex; gap: 8px; align-items: flex-start;
            font-size: 12px; color: var(--text-2); line-height: 1.55;
        }
        .cp-review-list li .cp-dot {
            flex-shrink: 0; width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; margin-top: 1px;
        }
        .cp-dot-pro { background: var(--teal-bg); color: var(--teal); }
        .cp-dot-con { background: var(--rose-bg); color: var(--rose); }
        /* Footer with size + profile link */
        .cp-peek-footer { display: flex; align-items: center; justify-content: space-between; }
        .cp-peek-size { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
        .cp-peek-link {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 600; color: var(--accent);
            cursor: pointer; text-decoration: none;
            padding: 6px 14px; border-radius: var(--radius-full);
            border: 1px solid var(--accent-border); background: var(--accent-bg);
            transition: all 0.15s;
        }
        .cp-peek-link:hover { background: rgba(232,89,12,0.12); border-color: var(--accent); }
        .job-apply {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 18px; border-radius: var(--radius-sm);
            background: var(--accent); color: #fff; text-decoration: none;
            font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .job-apply:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,89,12,0.2); }

        /* CULTURE SCORE BAR */
        .culture-score { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .cs-label { font-size: 11px; color: var(--text-3); white-space: nowrap; }
        .cs-bar { flex: 1; height: 4px; background: var(--bg-hover); border-radius: 2px; overflow: hidden; }
        .cs-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        .cs-fill.high { background: var(--teal); }
        .cs-fill.mid { background: #f59e0b; }
        .cs-fill.low { background: var(--rose); }
        .cs-val { font-family: var(--font-mono); font-size: 11px; font-weight: 600; min-width: 28px; }
        .cs-val.high { color: var(--teal); }
        .cs-val.mid { color: #d97706; }
        .cs-val.low { color: var(--rose); }

        /* NO RESULTS */
        .no-results { text-align: center; padding: 60px 20px; color: var(--text-3); }
        .no-results h3 { font-family: var(--font-display); font-size: 24px; color: var(--text-2); margin-bottom: 8px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(250,250,248,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 20px 24px; flex-direction: column; gap: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
            .nav-links.open { display: flex; }
            .main-grid { grid-template-columns: 1fr; }
            .sidebar { position: static; max-height: none; }
            /* Mobile filter collapse */
            .desktop-only { display: none; }
            .mobile-filter-bar {
                display: flex; align-items: center; gap: 10px;
                position: sticky; top: 53px; z-index: 50;
                background: var(--bg); padding: 8px 0 16px;

function parseSalaryMid(s) {
    const nums = s.match(/[\d,]+/g);
    if (!nums || nums.length < 2) return 0;
    const lo = parseInt(nums[0].replace(/,/g,''));
    const hi = parseInt(nums[1].replace(/,/g,''));
    return (lo + hi) / 2;
}

function getLocation(loc) {
    loc = loc.trim();
    // Fully remote (no specific office required)
    if (/^Remote(\s|,|$)/.test(loc) || loc === 'Remote') return 'Remote';
    if (loc.includes('Remote (Global)') || loc.includes('Remote (EU') || loc.includes('Remote (US')) return 'Remote';
    // For multi-location strings, classify by the FIRST segment
    var firstSeg = loc.split(/[;|]/).map(function(s){ return s.trim(); }).filter(function(s){ return s && !/^Remote/i.test(s); })[0] || loc;
    function classifyOne(s) {
        if (/San Francisco|NYC|New York|Seattle|Cambridge|Austin|Chicago|Los Angeles|Sunnyvale|Bellevue|Livingston|Washington, D|Boston|Palo Alto|San Diego|Manhattan|Philadelphia|Dallas|Richmond|Detroit|Plano|Cincinnati|Colorado Springs|Lowell|Reno|Aberdeen|Dalton|Denton|Lubbock|Muskogee|Ellendale|Afton|Sandusky|Lebanon|Quincy|Clarksville|Las Vegas|Atlanta|Central US|Northeast US|Multiple U\.S\.|United States|SF \/ |, CA|, NY|, WA|, MA|, TX|, NJ|, OH|, VA|, NV|, GA|, PA|, MO|, IL|, CO|, SD|, ND|, OK/.test(s) || s === 'US') return 'United States';
        if (/Paris|London|Dublin|Berlin|Amsterdam|Munich|Zurich|Zürich|Denmark|Barcelona|Madrid|Warsaw|Switzerland|Germany|United Kingdom|Belgrade|Europe|, UK|, IE|, PL|, CH/.test(s)) return 'Europe & UK';
        if (/Toronto|Montreal|Vancouver|Canada|Ottawa|, CAN/.test(s)) return 'Canada';
        if (/India|Bengaluru|Bangalore|Mumbai|Hyderabad|Gurgaon|Delhi|Pune|Chennai/.test(s)) return 'India';
        if (/Singapore|Japan|Tokyo|Korea|Taiwan|Philippines/.test(s)) return 'Asia Pacific';
        if (/Mexico|Brazil|Sao Paulo|São Paulo|Argentina|Uruguay|Costa Rica/.test(s)) return 'Latin America';
        if (/Doha|Qatar|Riyadh|Saudi|Dubai|UAE|Middle East|Casablanca/.test(s)) return 'Middle East';
        return null;
    }
    return classifyOne(firstSeg) || classifyOne(loc) || 'Other';
}

function getCompanySize(companyId) {
    const s = COMPANIES[companyId].size;
    if (s.includes('Large')) return 'Large (1000+)';
    if (s.includes('Mid')) return 'Mid (500-1500)';
    return 'Small (<500)';
}

function getRole(title) {
    const t = title.toLowerCase();

    // Priority 1: ML/AI — most specific, checked first to prevent "ML Engineer" → engineering
    const mlPatterns = [
        'machine learning', 'research scientist', 'research engineer',
        'reinforcement learning', 'ai safety', 'interpretability',
        'alignment', 'computer vision', 'nlp engineer', 'natural language',
        'deep learning', 'ai researcher', 'ai research',
        'ml engineer', 'ml infrastructure', 'ml platform', 'ml acceleration',
        'ml networking'
    ];
    if (mlPatterns.some(p => t.includes(p)) || / ml /i.test(t) || /\bllm\b/i.test(t)) {
        return 'ml-ai';
    }

    // Priority 2: Data
    const dataPatterns = [
        'data scien', 'data engineer', 'data analy', 'data infra',
        'data platform', 'advanced analytics', 'business intelligence',
        'bi engineer', 'bi analyst', 'analytics engineer'
    ];
    if (dataPatterns.some(p => t.includes(p))) return 'data';

    // Priority 3: Design (exclude "design engineer" → falls to engineering)
    if (t.includes('design') && !t.includes('engineer') && !t.includes('security')) {
        return 'design';
    }

    // Priority 4: Product (before Engineering so TPMs don't get stolen)
    const productPatterns = [
        'product manag', 'program manag', 'technical program',
        'product owner', 'product lead', 'scrum master', 'agile coach',
        'product strateg', 'product director', 'head of product',
        'product operation', 'product analys'
    ];
    if (productPatterns.some(p => t.includes(p))) return 'product';

    // Priority 5: Engineering (with exclusions for devrel, solutions/sales eng, biz systems)
    const engPatterns = [
        'engineer', 'developer', 'architect', 'platform', 'sre ',
        'site reliability', 'devops', 'qa ', 'quality assurance',
        'security', 'systems', 'infrastructure', 'frontend', 'backend',
        'fullstack', 'full stack', 'firmware', 'embedded'
    ];
    const engExclusions = [
        'developer relations', 'developer education', 'devrel',
        'solutions engineer', 'solutions architect', 'sales engineer',
        'business systems', 'customer support engineer', 'gtm'
    ];
    if (engPatterns.some(p => t.includes(p)) && !engExclusions.some(p => t.includes(p))) {
        return 'engineering';
    }

    // Priority 6: Marketing
    const marketingPatterns = [
        'marketing', 'communications', 'developer relations',
        'developer education', 'devrel', 'brand', 'social media',
        'public relations', 'copywriter', 'growth marketing',
        'community manag', 'influencer', 'creative', 'editorial',
        'content'
    ];
    if (marketingPatterns.some(p => t.includes(p))) return 'marketing';

    // Priority 7: Sales (exclude "accountant" so "Revenue Accountant" → finance)
    const salesPatterns = [
        'account exec', 'account manag', 'sales', 'solutions engineer',
        'solutions architect', 'sales engineer', 'gtm', 'business develop',
        'partnerships', 'deal desk', 'revenue', 'engagement manag',
        'customer success', 'pre-sales'
    ];
    if (salesPatterns.some(p => t.includes(p)) && !t.includes('accountant')) return 'sales';

    // Priority 8: Finance
    const financePatterns = [
        'accountant', 'accounting', 'financial', 'fp&a', 'treasury',
        'controller', 'actuary', 'actuarial', 'investor relations',
        'bookkeeper'
    ];
    if (financePatterns.some(p => t.includes(p))) return 'finance';
    if (t.includes('finance') && !t.includes('engineer')) return 'finance';

    // Priority 9: HR / People
    const hrPatterns = [
        'recruiter', 'recruiting', 'talent acquisition', 'people ops',
        'people operations', 'human resources', 'enablement', 'sourcer',
        'sourcing manag', 'learning and development', 'l&d',
        'executive business partner', 'people partner', 'hrbp',
        'onboarding'
    ];
    if (hrPatterns.some(p => t.includes(p)) || / hr /i.test(t)) return 'hr-people';

    // Priority 10: Legal
    const legalPatterns = [
        'legal', 'counsel', 'attorney', 'lawyer', 'policy',
        'regulatory', 'compliance', 'paralegal', 'data protection'
    ];
    if (legalPatterns.some(p => t.includes(p))) return 'legal';

    // Priority 11: Support
    const supportPatterns = [
        'customer support', 'premium support', 'claims',
        'service recovery', 'call center', 'help desk',
        'support specialist', 'support delivery', 'cs labs',
        'safety specialist', 'safety appeals'
    ];
    if (supportPatterns.some(p => t.includes(p))) return 'support';

    // Priority 12: Operations (catch-all for remaining ops roles)
    const opsPatterns = [
        'operations', 'supply', 'logistics', 'facilities',
        'localization', 'coordinator', 'vendor', 'procurement',
        'market manag', 'market assoc', 'business systems',
        'workplace', 'office manag', 'real estate', 'supervisor'
    ];
    if (opsPatterns.some(p => t.includes(p))) return 'operations';

    return null;
}

function getSeniority(title) {
    const t = title.toLowerCase();
    if (/\b(director|vp |vice president|chief|cto|ceo|cfo|coo|head of|svp|evp)\b/.test(t)) return 'director';
    if (/\b(staff|principal|distinguished)\b/.test(t)) return 'staff';
    // "Engineering Manager" and "Team Lead" → lead, but NOT "Product Manager" (that's a role)
    if (/\b(engineering manager|eng manager|team lead|tech lead|lead engineer|manager,?\s*(software|engineering|infrastructure|platform|security)|head of engineering)\b/.test(t)) return 'lead';
    if (/\b(senior|sr\.?|sr )\b/.test(t)) return 'senior';
    if (/\b(junior|jr\.?|jr |intern|associate|entry|fellow|coordinator)\b/.test(t) && !/\bassociate (director|vp)\b/.test(t)) return 'entry';
    return 'mid';
}

function getCultureScore(companyId) {
    const c = COMPANIES[companyId];
    if (activeValues.size === 0) return null; // no personal score without filters
    let matches = 0;
    activeValues.forEach(v => { if (c.values.includes(v)) matches++; });
    return { matched: matches, total: activeValues.size, pct: Math.round((matches / activeValues.size) * 100) };
}

function matchScore(companyId) {
    if (activeValues.size === 0) return 0;
    const cv = COMPANIES[companyId].values;
    let matches = 0;
    activeValues.forEach(v => { if (cv.includes(v)) matches++; });
    return matches / activeValues.size;
}

// ═══ CULTURE PEEK (expand culture info in job card) ═══
function getCultureSummary(companyKey) {
    var c = COMPANIES[companyKey];
    if (!c) return '';
    var v = new Set(c.values);
    var parts = [];
    // Work style
    if (v.has('async') && v.has('deep-work')) parts.push('async-first with a focus on deep work');
    else if (v.has('async')) parts.push('async-first communication');
    else if (v.has('deep-work')) parts.push('deep work over meetings');
    if (v.has('remote')) parts.push('truly remote-friendly');
    else if (v.has('flex-hours')) parts.push('flexible hours');
    // Team
    if (v.has('flat')) parts.push('flat hierarchy');
    if (v.has('diverse') && v.has('psych-safety')) parts.push('inclusive and safe to fail');
    else if (v.has('diverse')) parts.push('diverse & inclusive');
    else if (v.has('psych-safety')) parts.push('psychological safety');
    if (v.has('transparent')) parts.push('transparent decision-making');
    // Engineering
    if (v.has('eng-driven') && v.has('ship-fast')) parts.push('engineering-driven and ships fast');
    else if (v.has('eng-driven')) parts.push('engineering-driven culture');
    else if (v.has('ship-fast')) parts.push('ships fast and iterates');
    if (v.has('open-source')) parts.push('strong open-source DNA');
    // Growth & mission
    if (v.has('ethical-ai') && v.has('social-impact')) parts.push('mission-driven with a focus on AI safety');
    else if (v.has('ethical-ai')) parts.push('serious about AI safety');
    else if (v.has('social-impact')) parts.push('mission-driven');
    if (v.has('learning')) parts.push('invests in growth');
    if (v.has('equity')) parts.push('strong comp & equity');
    // Build sentence
    if (parts.length === 0) return 'Explore what it\'s like to work at ' + c.name + '.';
    if (parts.length === 1) return c.name + ' is known for ' + parts[0] + '.';
    var last = parts.pop();
    return c.name + ' is known for ' + parts.slice(0, 3).join(', ') + ', and ' + last + '.';
}

function updatePageMeta(count) {

    if (activeRoles.size > 0) {
        var roleNames = Array.from(activeRoles).map(function(r) { return ROLES[r] ? ROLES[r].name : r; });

        parts.push(senNames.join(', '));
    }
    if (activeLocations.size > 0) parts.push(Array.from(activeLocations).join(', '));
    if (activeValues.size > 0) {
        var names = Array.from(activeValues).map(function(v) { return VALUES[v] ? VALUES[v].name : v; });
        parts.push(names.join(', '));
    }
    if (searchQuery) parts.push(searchQuery);

        document.title = 'AI & Tech Jobs Filtered by Culture | JobsByCulture';
        var desc = 'Browse 0 AI & tech jobs filtered by culture values like async-first, work-life balance, remote-friendly, and ethical AI.';
    } else {
        var label = parts.join(' · ');
        document.title = count + ' ' + label + ' Jobs | JobsByCulture';
        var desc = 'Browse ' + count + ' ' + label + ' jobs filtered by culture values. Every job links directly to the original posting.';

// ═══ RENDER JOBS ═══
function renderJobs() {
    let filtered = JOBS.filter(j => {
        const c = COMPANIES[j.company];
        // Search
        if (searchQuery && !j.title.toLowerCase().includes(searchQuery) && !c.name.toLowerCase().includes(searchQuery) && !j.location.toLowerCase().includes(searchQuery)) return false;
        // Value filters
        if (activeValues.size > 0) {
            let hasAny = false;
            activeValues.forEach(v => { if (c.values.includes(v)) hasAny = true; });
            if (!hasAny) return false;
        }
        // Role filter
        if (activeRoles.size > 0 && !activeRoles.has(j._role)) return false;
        // Seniority filter
        if (activeSeniorities.size > 0 && !activeSeniorities.has(j._seniority)) return false;
        // Location
        if (activeLocations.size > 0 && !activeLocations.has(getLocation(j.location))) return false;
        // Size
        if (activeSizes.size > 0 && !activeSizes.has(getCompanySize(j.company))) return false;
        return true;
    });

    // Sort
    const sort = document.getElementById('sortSelect').value;
    let userSorted = false;

    if (sort === 'glassdoor') {
        filtered.sort((a,b) => COMPANIES[b.company].glassdoor - COMPANIES[a.company].glassdoor);
        userSorted = true;
    } else if (sort === 'recent') {
        const order = {'1d':1,'2d':2,'3d':3,'4d':4,'5d':5,'6d':6,'1w':7};
        filtered.sort((a,b) => (order[a.posted.replace(' ago','')]||10) - (order[b.posted.replace(' ago','')]||10));
        userSorted = true;
    } else if (activeValues.size > 0) {
        // Best Culture Match: sort by % of selected values matched (highest first)
        filtered.sort((a,b) => matchScore(b.company) - matchScore(a.company));
        userSorted = true;
    }

    // Spread jobs so same company doesn't appear consecutively
    const uniqueCompanies = new Set(filtered.map(j => j.company));
    if (uniqueCompanies.size > 1) {
        if (activeValues.size > 0 && sort === 'relevance') {
            // Group by match score tier, then interleave within each tier
            const tiers = {};
            filtered.forEach(j => {
                const score = Math.round(matchScore(j.company) * 100);
                if (!tiers[score]) tiers[score] = [];
                tiers[score].push(j);
            });
            const result = [];
            // Process tiers from highest to lowest
            Object.keys(tiers).sort((a, b) => b - a).forEach(score => {
                const tierJobs = tiers[score];
                const groups = {};
                tierJobs.forEach(j => { if (!groups[j.company]) groups[j.company] = []; groups[j.company].push(j); });
                const buckets = Object.values(groups).sort((a, b) => b.length - a.length);
                const tierSpread = [];
                let idx = 0;
                while (tierSpread.length < tierJobs.length) {
                    for (const g of buckets) { if (idx < g.length) tierSpread.push(g[idx]); }
                    idx++;
                }
                tierSpread.forEach(j => result.push(j));
            });
            filtered = result;
        } else {
            // Default: simple interleave across all companies
            const groups = {};
            filtered.forEach(j => { if (!groups[j.company]) groups[j.company] = []; groups[j.company].push(j); });
            const buckets = Object.values(groups).sort((a, b) => b.length - a.length);
            const spread = [];
            let idx = 0;
            while (spread.length < filtered.length) {
                for (const g of buckets) { if (idx < g.length) spread.push(g[idx]); }
                idx++;
            }
            filtered = spread;
        }
    }

    document.getElementById('resultsCount').innerHTML = `<b>${filtered.length}</b> jobs found${activeValues.size ? ` matching <b>${activeValues.size}</b> value${activeValues.size>1?'s':''}` : ''}`;

    // Dynamic SEO: update title and meta description based on active filters
    updatePageMeta(filtered.length);

    if (filtered.length === 0) {
        document.getElementById('jobsList').innerHTML = `<div class="no-results"><h3>No jobs match your filters</h3><p>Try removing some filters or broadening your search.</p></div>`;
        _lazyFiltered = [];
        _lazyRendered = 0;
        return;
    }

    // Lazy loading: render first batch, load more on scroll
    _lazyFiltered = filtered;
    _lazyRendered = 0;
    document.getElementById('jobsList').innerHTML = '';
    _renderBatch();
}

var _lazyFiltered = [];
var _lazyRendered = 0;
var _BATCH_SIZE = 200;
var _lazyLoading = false;

function _renderBatch() {
    if (_lazyRendered >= _lazyFiltered.length) return;
    var end = Math.min(_lazyRendered + _BATCH_SIZE, _lazyFiltered.length);
    var html = '';
    for (var i = _lazyRendered; i < end; i++) {
        html += _renderJobCard(_lazyFiltered[i]);
    }
    document.getElementById('jobsList').insertAdjacentHTML('beforeend', html);
    _lazyRendered = end;

    // Show/hide "load more" sentinel
    var sentinel = document.getElementById('lazySentinel');
    if (sentinel) {
        sentinel.style.display = _lazyRendered < _lazyFiltered.length ? 'block' : 'none';
        sentinel.textContent = _lazyRendered < _lazyFiltered.length
            ? 'Showing ' + _lazyRendered.toLocaleString() + ' of ' + _lazyFiltered.length.toLocaleString() + ' jobs — scroll for more'
            : '';
    }
    _lazyLoading = false;
}

// Intersection Observer for infinite scroll
(function() {
    var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && !_lazyLoading && _lazyRendered < _lazyFiltered.length) {
            _lazyLoading = true;
            _renderBatch();
        }
    }, { rootMargin: '600px' });

    // Create sentinel element after DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        var list = document.getElementById('jobsList');
        if (list) {
            var sentinel = document.createElement('div');
            sentinel.id = 'lazySentinel';
            sentinel.style.cssText = 'text-align:center;padding:24px;font-size:13px;color:var(--text-3);font-family:var(--font-mono)';
            list.parentNode.insertBefore(sentinel, list.nextSibling);
            observer.observe(sentinel);
        }
    });
})();

(function parseURL() {
    const params = new URLSearchParams(window.location.search);
    // Support ?values=a,b,c (from homepage "Show Matching Jobs")
    const vals = params.get('values');
    if (vals) {
        vals.split(',').forEach(v => { if (VALUES[v]) activeValues.add(v); });
    }
    // Support ?value=ethical-ai or ?value=wlb,async,open-source (comma-separated)
    const single = params.get('value');
    if (single) {
        single.split(',').forEach(v => { if (VALUES[v.trim()]) activeValues.add(v.trim()); });
    }
    // Support ?company=anthropic (from homepage company cards)
    const company = params.get('company');
    if (company && COMPANIES[company]) {

        document.getElementById('searchInputMobile').value = COMPANIES[company].name;

            return val ? '<span class="jt jt-' + val.color + '">' + val.ico + ' ' + val.name + '</span>' : '';
        }).join('');
        document.getElementById('cccLink').href = '/companies/' + company;
        document.getElementById('companyCultureCard').style.display = '';
    }
    // Support ?role=engineering or ?role=engineering,ml-ai
    const roleParam = params.get('role');
    if (roleParam) {
        roleParam.split(',').forEach(r => { if (ROLES[r]) activeRoles.add(r); });
    }
    // Support ?seniority=senior or ?seniority=senior,staff
    const senParam = params.get('seniority');
    if (senParam) {
        senParam.split(',').forEach(s => { if (SENIORITIES[s]) activeSeniorities.add(s); });
    }
    // Support ?location=India or ?location=Europe (from footer links)
    const locParam = params.get('location');
    if (locParam) {
        activeLocations.add(locParam);
    }
    // Support ?search=Dublin (from location pages, etc.)
    const searchParam = params.get('search');
    if (searchParam) {
        searchQuery = searchParam.toLowerCase();
        document.getElementById('searchInput').value = searchParam;
        document.getElementById('searchInputMobile').value = searchParam;
    }
    // Sync sidebar filter UI with activeValues
    if (activeValues.size > 0) {
        document.querySelectorAll('.vf').forEach(el => el.classList.toggle('on', activeValues.has(el.dataset.v)));
    }
    // Sync sidebar filter UI with activeRoles
    if (activeRoles.size > 0) {
        document.querySelectorAll('#roleFilters .lf').forEach(el => el.classList.toggle('on', activeRoles.has(el.dataset.r)));
    }
    // Sync sidebar filter UI with activeSeniorities
    if (activeSeniorities.size > 0) {
        document.querySelectorAll('#seniorityFilters .lf').forEach(el => el.classList.toggle('on', activeSeniorities.has(el.dataset.sn)));
    }
    // Sync sidebar filter UI with activeLocations
    if (activeLocations.size > 0) {
        document.querySelectorAll('#locFilters .lf').forEach(el => el.classList.toggle('on', activeLocations.has(el.dataset.l)));
    }
    if (activeValues.size > 0 || activeLocations.size > 0 || activeRoles.size > 0 || activeSeniorities.size > 0) {
        document.getElementById('clearFilters').classList.toggle('show', true);
    }
    updateFilterCount();
})();

<script>
// Generate JobPosting schema for Google Jobs (only on canonical /jobs page, not filtered views)
(function() {
    // Skip schema on filtered pages — Google indexes all jobs from the canonical /jobs URL
    if (window.location.search) return;

    const schemaJobs = JOBS.map(j => {
        const comp = COMPANIES[j.company] || {};
        const posted = j.posted || '3w+ ago';
        let daysAgo = 21;
        if (posted.includes('d')) daysAgo = parseInt(posted) || 1;
        else if (posted.includes('w')) daysAgo = (parseInt(posted) || 1) * 7;
        else if (posted.includes('mo')) daysAgo = (parseInt(posted) || 1) * 30;
        const datePosted = new Date(Date.now() - daysAgo * 86400000).toISOString().split('T')[0];
        const validThrough = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];

        // Parse location into structured address
        const loc = j.location || '';
        const locParts = loc.split(/[|,;·\/]/).map(s => s.trim()).filter(Boolean);
        const primaryLoc = locParts[0] || loc;
        const isRemote = /^Remote(\s|,|$)/.test(loc.trim()) || loc.includes('Remote (Global)') || loc.includes('Remote (EU') || loc.includes('Remote (US');
        const hasRemote = loc.toLowerCase().includes('remote');

        // Map location to country code and region
        var US_CITY_STATE = {
            'San Francisco':'CA','SF':'CA','NYC':'NY','New York':'NY','Manhattan':'NY','Brooklyn':'NY',
            'Seattle':'WA','Bellevue':'WA','Redmond':'WA',
            'Austin':'TX','Dallas':'TX','Plano':'TX','Houston':'TX','San Antonio':'TX','Denton':'TX','Lubbock':'TX',
            'Chicago':'IL','Quincy':'IL',
            'Los Angeles':'CA','Sunnyvale':'CA','Palo Alto':'CA','Mountain View':'CA','San Jose':'CA','Menlo Park':'CA','Santa Clara':'CA','Oakland':'CA','San Diego':'CA','Cupertino':'CA','Irvine':'CA','Redwood City':'CA',
            'Boston':'MA','Cambridge':'MA','Lowell':'MA',
            'Washington':'DC','Arlington':'VA','Richmond':'VA','McLean':'VA',
            'Philadelphia':'PA','Pittsburgh':'PA',
            'Las Vegas':'NV','Reno':'NV',
            'Atlanta':'GA','Dalton':'GA',
            'Detroit':'MI',
            'Cincinnati':'OH','Sandusky':'OH','Cleveland':'OH','Columbus':'OH',
            'Colorado Springs':'CO','Denver':'CO','Boulder':'CO',
            'Minneapolis':'MN',
            'Portland':'OR',
            'Nashville':'TN','Clarksville':'TN',
            'Lebanon':'NH',
            'Aberdeen':'SD',
            'Muskogee':'OK',
            'Ellendale':'ND',
            'Afton':'MO',
            'Miami':'FL','Tampa':'FL','Orlando':'FL',
            'Salt Lake City':'UT',
            'Raleigh':'NC','Charlotte':'NC','Durham':'NC',
            'Indianapolis':'IN'
        };
        function parseAddress(locStr) {
            // For multi-location strings, use the first non-remote segment
            var seg = locStr.split(/[;|]/).map(function(s){ return s.trim(); }).filter(function(s){ return s && !/^Remote/i.test(s); })[0] || locStr;
            seg = seg.replace(/^(Office,?\s*|Hybrid\s*[—-]?\s*)/i, '').trim();
            var addr = { "@type": "PostalAddress" };
            // US states
            var usMatch = seg.match(/,\s*(CA|NY|WA|MA|TX|NJ|OH|VA|NV|GA|PA|MO|IL|CO|SD|ND|OK|DC|FL|OR|MN|MI|UT|NC|IN|TN|NH|MD|CT|WI|AZ|SC|KY|LA|AL|HI)\b/);
            if (usMatch || /San Francisco|NYC|New York|Seattle|Austin|Chicago|Los Angeles|Sunnyvale|Bellevue|Boston|Palo Alto|Washington, D|Manhattan|Philadelphia|Dallas|Richmond|Detroit|Plano|Cincinnati|Colorado Springs|Lowell|Reno|Aberdeen|Dalton|Denton|Lubbock|Muskogee|Ellendale|Afton|Sandusky|Lebanon|Quincy|Clarksville|Las Vegas|Atlanta|Denver|Boulder|Portland|Minneapolis|Miami|Tampa|Salt Lake|Raleigh|Charlotte|Durham|Mountain View|San Jose|Menlo Park|Santa Clara|Oakland|Cupertino|Irvine|Redwood City|Cambridge|Pittsburgh|Cleveland|Columbus|Orlando|Indianapolis|Nashville|Brooklyn|Houston|San Diego|San Antonio/.test(seg) || /^SF\b/.test(seg)) {
                var city = seg.split(/[,\/]/)[0].trim();
                addr.addressLocality = city;
                // Try explicit state match first, then city lookup
                if (usMatch) {
                    addr.addressRegion = usMatch[1];
                } else {
                    // Look up city in mapping
                    var foundState = '';
                    for (var c in US_CITY_STATE) {
                        if (seg.indexOf(c) !== -1) { foundState = US_CITY_STATE[c]; break; }
                    }
                    addr.addressRegion = foundState;
                }
                addr.addressCountry = 'US';
            } else if (/Central US|Northeast US|Multiple U\.S\./.test(seg) || seg === 'US' || /^United States/.test(seg)) {
                addr.addressLocality = 'United States'; addr.addressCountry = 'US';
            } else if (/Paris/.test(seg)) {
                addr.addressLocality = 'Paris'; addr.addressCountry = 'FR';
            } else if (/London/.test(seg)) {
                addr.addressLocality = 'London'; addr.addressCountry = 'GB';
            } else if (/Dublin/.test(seg)) {
                addr.addressLocality = 'Dublin'; addr.addressCountry = 'IE';
            } else if (/Berlin|Munich/.test(seg)) {
                addr.addressLocality = seg.match(/Berlin|Munich/)[0]; addr.addressCountry = 'DE';
            } else if (/Amsterdam/.test(seg)) {
                addr.addressLocality = 'Amsterdam'; addr.addressCountry = 'NL';
            } else if (/Zurich|Zürich|Switzerland/.test(seg)) {
                addr.addressLocality = 'Zurich'; addr.addressCountry = 'CH';
            } else if (/Barcelona|Madrid/.test(seg)) {
                addr.addressLocality = seg.match(/Barcelona|Madrid/)[0]; addr.addressCountry = 'ES';
            } else if (/Denmark/.test(seg)) {
                addr.addressLocality = 'Copenhagen'; addr.addressCountry = 'DK';
            } else if (/Belgrade/.test(seg)) {
                addr.addressLocality = 'Belgrade'; addr.addressCountry = 'RS';
            } else if (/Warsaw/.test(seg)) {
                addr.addressLocality = 'Warsaw'; addr.addressCountry = 'PL';
            } else if (/United Kingdom|, UK/.test(seg)) {
                addr.addressLocality = 'London'; addr.addressCountry = 'GB';
            } else if (/Poland|, PL/.test(seg)) {
                addr.addressLocality = 'Warsaw'; addr.addressCountry = 'PL';
            } else if (/Europe/.test(seg)) {
                addr.addressLocality = 'Berlin'; addr.addressCountry = 'DE';
            } else if (/Toronto|Montreal|Vancouver|Ottawa|Calgary|Edmonton|Waterloo|Canada|, CAN/.test(seg)) {
                addr.addressLocality = (seg.match(/Toronto|Montreal|Vancouver|Ottawa|Calgary|Edmonton|Waterloo/) || ['Toronto'])[0];
                var caProvinces = {'Toronto':'ON','Ottawa':'ON','Waterloo':'ON','Montreal':'QC','Vancouver':'BC','Calgary':'AB','Edmonton':'AB'};
                addr.addressRegion = caProvinces[addr.addressLocality] || '';
                addr.addressCountry = 'CA';
            } else if (/Bengaluru|Bangalore|Mumbai|Hyderabad|Delhi|Pune|Chennai|India/.test(seg)) {
                addr.addressLocality = (seg.match(/Bengaluru|Bangalore|Mumbai|Hyderabad|Delhi|Pune|Chennai/) || ['Bengaluru'])[0]; addr.addressCountry = 'IN';
            } else if (/Singapore/.test(seg)) {
                addr.addressLocality = 'Singapore'; addr.addressCountry = 'SG';
            } else if (/Tokyo|Japan/.test(seg)) {
                addr.addressLocality = 'Tokyo'; addr.addressCountry = 'JP';
            } else if (/Korea/.test(seg)) {
                addr.addressLocality = 'Seoul'; addr.addressCountry = 'KR';
            } else if (/Taiwan/.test(seg)) {
                addr.addressLocality = 'Taipei'; addr.addressCountry = 'TW';
            } else if (/Philippines/.test(seg)) {
                addr.addressLocality = 'Manila'; addr.addressCountry = 'PH';
            } else if (/Mexico/.test(seg)) {
                addr.addressLocality = 'Mexico City'; addr.addressCountry = 'MX';
            } else if (/Sao Paulo|São Paulo|Brazil/.test(seg)) {
                addr.addressLocality = 'São Paulo'; addr.addressCountry = 'BR';
            } else if (/Argentina/.test(seg)) {
                addr.addressLocality = 'Buenos Aires'; addr.addressCountry = 'AR';
            } else if (/Uruguay/.test(seg)) {
                addr.addressLocality = 'Montevideo'; addr.addressCountry = 'UY';
            } else if (/Costa Rica/.test(seg)) {
                addr.addressLocality = 'San José'; addr.addressCountry = 'CR';
            } else if (/Doha|Qatar/.test(seg)) {
                addr.addressLocality = 'Doha'; addr.addressCountry = 'QA';
            } else if (/Riyadh|Saudi/.test(seg)) {
                addr.addressLocality = 'Riyadh'; addr.addressCountry = 'SA';
            } else if (/Dubai|UAE/.test(seg)) {
                addr.addressLocality = 'Dubai'; addr.addressCountry = 'AE';
            } else if (/Casablanca/.test(seg)) {
                addr.addressLocality = 'Casablanca'; addr.addressCountry = 'MA';
            } else if (/Middle East/.test(seg)) {
                addr.addressLocality = 'Doha'; addr.addressCountry = 'QA';
            } else {
                addr.addressLocality = seg.split(/[,\/]/)[0].trim();
                // Try to infer country from remaining text
                var countryMatch = seg.match(/,\s*(Australia|New Zealand|Israel|Nigeria|Kenya|South Africa|China|Hong Kong|Indonesia|Vietnam|Thailand|Malaysia|Romania|Czech|Hungary|Finland|Sweden|Norway|Italy|Austria|Belgium|Greece|Portugal|Lithuania|Latvia|Estonia|Croatia|Slovakia|Slovenia|Bulgaria|Ukraine|Turkey|Egypt|Chile|Colombia|Peru|Ecuador)/i);
                if (countryMatch) {
                    var countryMap = {'Australia':'AU','New Zealand':'NZ','Israel':'IL','Nigeria':'NG','Kenya':'KE','South Africa':'ZA','China':'CN','Hong Kong':'HK','Indonesia':'ID','Vietnam':'VN','Thailand':'TH','Malaysia':'MY','Romania':'RO','Czech':'CZ','Hungary':'HU','Finland':'FI','Sweden':'SE','Norway':'NO','Italy':'IT','Austria':'AT','Belgium':'BE','Greece':'GR','Portugal':'PT','Lithuania':'LT','Latvia':'LV','Estonia':'EE','Croatia':'HR','Slovakia':'SK','Slovenia':'SI','Bulgaria':'BG','Ukraine':'UA','Turkey':'TR','Egypt':'EG','Chile':'CL','Colombia':'CO','Peru':'PE','Ecuador':'EC'};
                    for (var cn in countryMap) {
                        if (countryMatch[1].toLowerCase().indexOf(cn.toLowerCase()) !== -1) {
                            addr.addressCountry = countryMap[cn]; break;
                        }
                    }
                }
            }
            // Remove empty string fields — missing is better than empty for Google
            if (!addr.addressLocality) delete addr.addressLocality;
            if (!addr.addressRegion) delete addr.addressRegion;
            if (!addr.addressCountry) delete addr.addressCountry;
            return addr;
        }

        const schema = {
            "@context": "https://schema.org",
            "@type": "JobPosting",
            "title": j.title,
            "description": j.title + " — " + (comp.name || j.company) + ". " + (j.type || "Full-time") + " role based in " + loc + ". Apply directly via " + (comp.name || j.company) + " careers.",
            "datePosted": datePosted,
            "validThrough": validThrough,
            "hiringOrganization": {
                "@type": "Organization",
                "name": comp.name || j.company,
                "sameAs": comp.careers || "",
                "logo": comp.logo || ""
            },
            "employmentType": "FULL_TIME",
            "directApply": false,
            "url": j.url
        };

        // Job location (required for non-remote, recommended for all)
        if (!isRemote) {
            schema.jobLocation = {
                "@type": "Place",
                "address": parseAddress(loc)
            };
        }

        // Remote jobs: applicantLocationRequirements (critical for Google)
        if (isRemote) {
            schema.jobLocationType = "TELECOMMUTE";
            // Determine location requirement from the remote string
            if (loc.includes('Canada') && loc.includes('United States')) {
                schema.applicantLocationRequirements = [
                    { "@type": "Country", "name": "US" },
                    { "@type": "Country", "name": "CA" }
                ];
            } else if (loc.includes('United States') || loc.includes('(US')) {
                schema.applicantLocationRequirements = { "@type": "Country", "name": "US" };
            } else if (loc.includes('Canada')) {
                schema.applicantLocationRequirements = { "@type": "Country", "name": "CA" };
            } else if (loc.includes('India')) {
                schema.applicantLocationRequirements = { "@type": "Country", "name": "IN" };
            } else if (loc.includes('Poland')) {
                schema.applicantLocationRequirements = { "@type": "Country", "name": "PL" };
            } else if (loc.includes('(EU') || loc.includes('Europe')) {
                schema.applicantLocationRequirements = { "@type": "Continent", "name": "Europe" };
            } else {
                // Fully remote / global
                schema.applicantLocationRequirements = { "@type": "Country", "name": "US" };
            }
        } else if (hasRemote) {
            // Hybrid roles: include both location and telecommute
            schema.jobLocationType = "TELECOMMUTE";
            var hybridAddr = parseAddress(loc);
            schema.applicantLocationRequirements = { "@type": "Country", "name": hybridAddr.addressCountry || "US" };
        }

        // Salary (when available)
        if (j.salary) {
            const nums = j.salary.match(/[\d,]+/g);
            if (nums && nums.length >= 2) {
                schema.baseSalary = {
                    "@type": "MonetaryAmount",
                    "currency": "USD",
                    "value": {
                        "@type": "QuantitativeValue",
                        "minValue": parseInt(nums[0].replace(/,/g,'')),
                        "maxValue": parseInt(nums[1].replace(/,/g,'')),
                        "unitText": "YEAR"
                    }
                };
            }
        }
        return schema;
    });
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(schemaJobs);
    document.head.appendChild(script);
})();
</script>
